<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#4A3AA8"/>
      <stop offset="100%" stop-color="#2D2475"/>
    </linearGradient>
  </defs>

  <!-- Background rounded square -->
  <rect width="512" height="512" rx="88" fill="url(#bg)"/>

  <!-- Commodore C= chickenhead logo, circle centre (256,155) r=62        -->
  <!-- Arc: top-right opening (300,111) → bottom-right (300,199), long way -->
  <path d="M 300,111 A 62,62 0 1 0 300,199"
        fill="none" stroke="#706DEB" stroke-width="26" stroke-linecap="round"/>
  <!-- Two horizontal bars crossing through the C opening -->
  <line x1="194" y1="143" x2="310" y2="143"
        stroke="#706DEB" stroke-width="18" stroke-linecap="round"/>
  <line x1="194" y1="167" x2="310" y2="167"
        stroke="#706DEB" stroke-width="18" stroke-linecap="round"/>

  <!-- "64" — large, yellow, centred -->
  <text x="256" y="400"
        font-family="sans-serif" font-size="162" font-weight="900"
        fill="#EDF171" text-anchor="middle">64</text>

  <!-- Stylised keyboard rows at the bottom -->
  <rect x="56" y="424" width="400" height="11" rx="4" fill="#1A1458" opacity="0.85"/>
  <rect x="56" y="445" width="400" height="11" rx="4" fill="#1A1458" opacity="0.85"/>
  <rect x="72" y="466" width="296" height="11" rx="4" fill="#1A1458" opacity="0.85"/>

  <!-- Subtle frame -->
  <rect width="512" height="512" rx="88" fill="none"
        stroke="#706DEB" stroke-width="3" opacity="0.22"/>
</svg>
